<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nzé – Administration</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:#FAEEDA; min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .login-card { background:#fff; border-radius:24px; padding:48px 40px 40px; width:400px; max-width:92vw; box-shadow:0 20px 60px rgba(99,56,6,0.08); text-align:center; }
  .logo { font-family:'DM Serif Display',serif; font-size:36px; color:#633806; margin-bottom:4px; }
  .logo span { color:#EF9F27; }
  .sub { font-size:13px; color:#8A7A6A; margin-bottom:32px; }
  .form-group { margin-bottom:18px; text-align:left; }
  label { display:block; font-size:12px; font-weight:600; color:#633806; margin-bottom:5px; text-transform:uppercase; letter-spacing:0.04em; }
  input { width:100%; padding:14px 16px; border:1.5px solid #EDE3D6; border-radius:12px; font-size:15px; font-family:'DM Sans',sans-serif; transition:border .15s; background:#FAF8F6; }
  input:focus { outline:none; border-color:#EF9F27; background:#fff; }
  .btn { width:100%; padding:14px; border:0; border-radius:12px; font-size:15px; font-weight:600; font-family:'DM Sans',sans-serif; background:#EF9F27; color:#1A120B; cursor:pointer; transition:all .15s; margin-top:6px; }
  .btn:hover { background:#D4891A; transform:translateY(-1px); }
  .error { color:#C62828; font-size:13px; margin-top:12px; display:none; }
  .loading { display:none; margin-top:16px; color:#8A7A6A; font-size:13px; }
  .loading .spinner { display:inline-block; width:16px; height:16px; border:2px solid #EDE3D6; border-top-color:#EF9F27; border-radius:50%; animation:spin .6s linear infinite; margin-right:6px; vertical-align:middle; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
  <div class="login-card">
    <div class="logo">Nzé<span>.</span></div>
    <div class="sub">Espace administration</div>
    <form id="loginForm" autocomplete="off">
      <div class="form-group">
        <label>Identifiant</label>
        <input type="text" id="username" placeholder="admin" value="admin" required>
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" id="password" placeholder="Mot de passe" required>
      </div>
      <button type="submit" class="btn">Se connecter</button>
      <div class="error" id="loginError">Identifiants incorrects</div>
      <div class="loading" id="loginLoading"><span class="spinner"></span> Connexion…</div>
    </form>
  </div>
  <script src="../config.js"></script>
  <script>
    const CFG = window.NZE_CONFIG || {};
    const EXTRA = CFG.API_HEADERS || {};
    const API = CFG.API_BACKEND_URL || (location.port === '3000' ? '' : (location.hostname === 'localhost' || location.hostname === '127.0.0.1' ? 'http://localhost:3000' : ''));
    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('loginError');
      const loadingEl = document.getElementById('loginLoading');
      errorEl.style.display = 'none';
      loadingEl.style.display = 'block';
      try {
        const r = await fetch(API + '/api/auth/login', {
          method: 'POST',
          headers: Object.assign({}, EXTRA, { 'Content-Type': 'application/json' }),
          body: JSON.stringify({ username, password })
        });
        if (!r.ok) {
          const errData = await r.json().catch(()=>{});
          errorEl.textContent = errData?.error || 'Erreur ' + r.status;
          errorEl.style.display = 'block';
          loadingEl.style.display = 'none';
          return;
        }
        const data = await r.json();
        localStorage.setItem('nzetoken', data.token);
        localStorage.setItem('nzetime', Date.now());
        window.location.href = 'index.html';
      } catch (err) {
        errorEl.textContent = '❌ Impossible de joindre le serveur. Vérifie que le backend est lancé.';
        errorEl.style.display = 'block';
        loadingEl.style.display = 'none';
      }
    });
    if (localStorage.getItem('nzetoken')) { window.location.href = 'index.html'; }
  </script>
</body>
</html>
